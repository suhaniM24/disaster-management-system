<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Disaster Response</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1e1e1e, #0a0a0a);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body>

    <div class="login-card fade-in">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white">
                <i class="bi bi-shield-lock-fill text-danger"></i> Admin Login
            </h2>
            <p class="text-secondary">Disaster Management System</p>
        </div>

        <div class="card glass-card p-4 shadow" id="auth-card">
            <div id="error-message" class="alert alert-danger d-none mb-3">
                <i class="bi bi-x-circle-fill"></i> <span id="error-text"></span>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control bg-dark border-secondary text-white" id="username"
                            placeholder="Enter username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary">
                            <i class="bi bi-key-fill"></i>
                        </span>
                        <input type="password" class="form-control bg-dark border-secondary text-white" id="password"
                            placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary border-secondary" type="button" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-emergency w-100 py-2 fw-bold">
                    LOGIN <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>

            <div class="mt-4 text-center">
                <a href="index.html" class="text-decoration-none text-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Script Dependencies -->
    <script src="js/auth.js"></script>
    <script>
        // Password Visibility Toggle
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('bi-eye');
            this.querySelector('i').classList.toggle('bi-eye-slash');
        });

        // Login Form Submission
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const authCard = document.getElementById('auth-card');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            // Reset UI
            authCard.classList.remove('shake');
            errorMessage.classList.add('d-none');

            // Attempt Login (Logic from auth.js)
            const success = attemptLogin(usernameInput.value, passwordInput.value);

            if (success) {
                // Success - Redirect
                window.location.href = 'admin-dashboard.html';
            } else {
                // Failure - UI feedback
                setTimeout(() => {
                    authCard.classList.add('shake');
                    errorText.textContent = "Invalid username or password.";
                    errorMessage.classList.remove('d-none');
                }, 50);
            }
        });
    </script>
</body>

</html>
