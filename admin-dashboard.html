<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Disaster Response</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-dark text-white">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-danger">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="#">
                <i class="bi bi-shield-lock-fill"></i> ADMIN PANEL
            </a>
            <div class="d-flex align-items-center">
                <a href="map.html" class="btn btn-outline-light btn-sm me-2">Map</a>
                <a href="user.html" class="btn btn-outline-light btn-sm me-3">User View</a>
                <button onclick="logout()" class="btn btn-danger btn-sm">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-4">
            <!-- Disaster Entry Form -->
            <div class="col-lg-4">
                <div class="card glass-card p-4 h-100 shadow">
                    <h4 class="mb-4 text-danger fw-bold">
                        <i class="bi bi-plus-circle-fill"></i> Report New Disaster
                    </h4>
                    <form id="disaster-form">
                        <div class="mb-3">
                            <label class="form-label small">Disaster Type</label>
                            <select class="form-select bg-dark text-white border-secondary" id="type" required>
                                <option value="" selected disabled>Select Type</option>
                                <option value="Earthquake">🌍 Earthquake</option>
                                <option value="Flood">🌊 Flood</option>
                                <option value="Hurricane">🌀 Hurricane</option>
                                <option value="Wildfire">🔥 Wildfire</option>
                                <option value="Tsunami">🌋 Tsunami</option>
                                <option value="Cyclone">🌪️ Cyclone</option>
                                <option value="Landslide">⛰️ Landslide</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Location Name</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="location"
                                placeholder="City, Country" required>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label small">Latitude</label>
                                <input type="number" step="any" class="form-control bg-dark text-white border-secondary"
                                    id="latitude" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small">Longitude</label>
                                <input type="number" step="any" class="form-control bg-dark text-white border-secondary"
                                    id="longitude" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small d-block">Severity</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="severity" id="sev-low" value="Low" checked>
                                <label class="btn btn-outline-success btn-sm" for="sev-low">Low</label>

                                <input type="radio" class="btn-check" name="severity" id="sev-medium" value="Medium">
                                <label class="btn btn-outline-warning btn-sm" for="sev-medium">Medium</label>

                                <input type="radio" class="btn-check" name="severity" id="sev-high" value="High">
                                <label class="btn btn-outline-orange btn-sm"
                                    style="border-color: #ff9f43; color: #ff9f43;" for="sev-high">High</label>

                                <input type="radio" class="btn-check" name="severity" id="sev-critical"
                                    value="Critical">
                                <label class="btn btn-outline-danger btn-sm" for="sev-critical">Critical</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Affected Population</label>
                            <input type="number" class="form-control bg-dark text-white border-secondary" id="affected"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Description</label>
                            <textarea class="form-control bg-dark text-white border-secondary" id="description" rows="3"
                                required></textarea>
                        </div>
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="status" checked>
                            <label class="form-check-label small" for="status">Active Case</label>
                        </div>
                        <button type="submit" class="btn btn-emergency w-100 fw-bold" id="submit-btn">
                            ➕ ADD DISASTER
                        </button>
                    </form>
                </div>
            </div>

            <!-- Management Table -->
            <div class="col-lg-8">
                <div class="card glass-card h-100 shadow overflow-hidden">
                    <div
                        class="card-header bg-transparent border-bottom border-secondary d-flex justify-content-between align-items-center p-3">
                        <h5 class="mb-0 fw-bold text-white"><i class="bi bi-list-task"></i> Live Incident Management
                        </h5>
                        <div id="loading" class="spinner-border spinner-border-sm text-danger d-none"></div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover mb-0">
                            <thead>
                                <tr class="text-secondary small">
                                    <th>Type</th>
                                    <th>Location</th>
                                    <th>Severity</th>
                                    <th class="text-center">Affected</th>
                                    <th class="text-center">Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="disaster-table-body" class="small">
                                <!-- Data populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-white bg-danger border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Auth must load first (no Firebase dependency) -->
    <script src="js/auth.js"></script>
    <script>checkAdminSession();</script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase Compat SDK (works without a local server) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config (initializes global db) -->
    <script src="js/firebase-config.js"></script>

    <!-- Admin Logic -->
    <script src="js/admin.js"></script>
</body>

</html>
