<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Disaster Map | Disaster Response</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100%;
            border: none;
            border-radius: 0;
        }

        .map-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .map-overlay>* {
            pointer-events: auto;
        }

        .legend {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--primary-red);
            color: white;
            font-size: 0.8rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .filter-container {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .active-badge {
            background: var(--critical-red);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 0 15px var(--critical-red);
        }

        .leaflet-popup-content-wrapper {
            background: rgba(30, 30, 30, 0.95);
            color: white;
            border: 1px solid var(--primary-red);
        }

        .leaflet-popup-tip {
            background: var(--primary-red);
        }
    </style>
</head>

<body>

    <!-- Back Button -->
    <div style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
        <a href="index.html" class="btn btn-dark opacity-75 border-secondary rounded-pill px-3">
            <i class="bi bi-house-door-fill"></i> Home
        </a>
    </div>

    <!-- Active Count Overlay -->
    <div class="map-overlay">
        <div class="active-badge animate-pulse">
            🚨 <span id="active-count">0</span> ACTIVE DISASTERS
        </div>
    </div>

    <!-- Filter Buttons -->
    <div class="filter-container d-flex flex-column gap-2 text-white">
        <small class="text-secondary mb-1">Filter Disasters</small>
        <button class="btn btn-sm btn-outline-light filter-btn active" data-filter="All">All</button>
        <button class="btn btn-sm btn-outline-danger filter-btn" data-filter="Earthquake">Earthquake</button>
        <button class="btn btn-sm btn-outline-primary filter-btn" data-filter="Flood">Flood</button>
        <button class="btn btn-sm btn-outline-warning filter-btn" data-filter="Wildfire">Wildfire</button>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Legend -->
    <div class="legend">
        <h6 class="fw-bold mb-3">Severity Legend</h6>
        <div class="legend-item">
            <div class="legend-color badge-critical"></div> Critical Risk (50km)
        </div>
        <div class="legend-item">
            <div class="legend-color badge-high"></div> High Risk (30km)
        </div>
        <div class="legend-item">
            <div class="legend-color badge-medium"></div> Medium Risk (15km)
        </div>
        <div class="legend-item">
            <div class="legend-color badge-low"></div> Low Risk (5km)
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <!-- Map Logic -->
    <script src="js/map.js"></script>
</body>

</html>
